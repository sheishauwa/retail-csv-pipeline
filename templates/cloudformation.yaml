AWSTemplateFormatVersion: '2010-09-09'
Resources:

  RawBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "retail-raw-csv-${AWS::AccountId}"

  ProcessedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "retail-parquet-data-${AWS::AccountId}"

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RetailLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - s3:GetObject
                  - s3:PutObject
                Resource: arn:aws:s3:::retail-raw-csv-${AWS::AccountId}/*
              - Effect: Allow
                Action: 
                  - s3:PutObject
                Resource: arn:aws:s3:::retail-parquet-data-${AWS::AccountId}/*

  TransformFunction:
  Type: AWS::Lambda::Function
  Properties:
    FunctionName: CSVToParquetTransformer
    Handler: transform_and_store.lambda_handler
    Role: !GetAtt LambdaRole.Arn
    Runtime: python3.9
    Timeout: 60
    Code:
      S3Bucket: retail-csv-pipeline-code-YOURNAME
      S3Key: transform_and_store.zip

LambdaInvokePermission:
  Type: AWS::Lambda::Permission
  Properties:
    FunctionName: !Ref TransformFunction
    Action: lambda:InvokeFunction
    Principal: s3.amazonaws.com
    SourceArn: !GetAtt RawBucket.Arn

RawBucketNotification:
  Type: AWS::S3::BucketNotification
  Properties:
    Bucket: !Ref RawBucket
    NotificationConfiguration:
      LambdaConfigurations:
        - Event: s3:ObjectCreated:*
          Function: !GetAtt TransformFunction.Arn


Outputs:
  RawBucket: 
    Value: !Ref RawBucket
  ProcessedBucket: 
    Value: !Ref ProcessedBucket
