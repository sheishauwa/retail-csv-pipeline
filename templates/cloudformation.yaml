AWSTemplateFormatVersion: '2010-09-09'
Description: Retail CSV to Parquet pipeline

Parameters:
  InputBucket:
    Type: String
  OutputBucket:
    Type: String
  AthenaResultsBucket:
    Type: String
  LambdaS3Key:
    Type: String

Resources:
  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RetailPipelineLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaS3Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::${InputBucket}/*
                  - !Sub arn:aws:s3:::${OutputBucket}/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  CsvTransformerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: retail-csv-transformer
      Handler: transform_and_store.lambda_handler
      Runtime: python3.9
      Role: !GetAtt PipelineRole.Arn
      Code:
        S3Bucket: !Ref InputBucket
        S3Key: !Ref LambdaS3Key
      Timeout: 300
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref OutputBucket

  LambdaPermissionForS3:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CsvTransformerFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub arn:aws:s3:::${InputBucket}

  InputBucketNotification:
    Type: Custom::S3Notification
    DependsOn: LambdaPermissionForS3
    Properties:
      ServiceToken: !GetAtt S3NotificationLambda.Arn
      Bucket: !Ref InputBucket
      NotificationConfiguration:
        LambdaFunctionConfigurations:
          - Event: "s3:ObjectCreated:*"
            Function: !GetAtt CsvTransformerFunction.Arn

  S3NotificationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: helper-s3-notification
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt PipelineRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          def handler(event, context):
              s3 = boto3.client('s3')
              props = event['ResourceProperties']
              bucket = props['Bucket']
              config = props['NotificationConfiguration']
              s3.put_bucket_notification_configuration(
                  Bucket=bucket,
                  NotificationConfiguration=config
              )
              return { 'Status': 'SUCCESS' }

Outputs:
  LambdaFunctionArn:
    Value: !GetAtt CsvTransformerFunction.Arn
