AWSTemplateFormatVersion: '2010-09-09'
Description: Retail CSV Pipeline - Simplified Template

Parameters:
  InputBucket:
    Type: String
  OutputBucket:
    Type: String
  LambdaS3Key:
    Type: String

Resources:
  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RetailPipelineLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaS3Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::${InputBucket}/*
                  - !Sub arn:aws:s3:::${OutputBucket}/*

  CsvTransformerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: retail-csv-transformer
      Handler: transform_and_store.lambda_handler
      Runtime: python3.9
      Role: !GetAtt PipelineRole.Arn
      Code:
        S3Bucket: !Ref InputBucket
        S3Key: !Ref LambdaS3Key
      Timeout: 300
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref OutputBucket

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CsvTransformerFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub arn:aws:s3:::${InputBucket}

Outputs:
  LambdaFunctionArn:
    Value: !GetAtt CsvTransformerFunction.Arn
