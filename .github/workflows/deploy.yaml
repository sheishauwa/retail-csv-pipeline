name: Deploy Retail CSV Pipeline

on:
  push:
    branches:
      - main
 
jobs: 
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file templates/cloudformation.yaml \
            --stack-name retail-csv-pipeline \
            --parameter-overrides \
              InputBucket=retail-input-bucket-123 \
              OutputBucket=retail-output-bucket-123 \
              LambdaS3Key=lambda_function.zip \
            --capabilities CAPABILITY_NAMED_IAM
 
